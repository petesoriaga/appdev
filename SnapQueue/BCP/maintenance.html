<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" href="/favicon.png?v=2">
  <link rel="icon" href="/favicon.ico?v=2" type="image/x-icon">
  <link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon">
  <title>Service Notice | SnapQueue</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-white flex items-center justify-center p-6">
  <main class="w-full max-w-xl bg-slate-800/80 border border-slate-700 rounded-2xl p-8 text-center">
    <p id="mode-label" class="text-xs font-black uppercase tracking-widest text-blue-300 mb-2">Service Notice</p>
    <h1 id="mode-title" class="text-3xl font-black mb-4">Website Temporarily Unavailable</h1>
    <p id="mode-message" class="text-slate-200 leading-relaxed">Please try again later.</p>
    <div class="mt-8">
      <a href="/login.html" class="inline-block px-5 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold transition-colors">Go to Login</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const label = document.getElementById("mode-label");
    const title = document.getElementById("mode-title");
    const message = document.getElementById("mode-message");

    if (mode === "maintenance") {
      label.textContent = "Maintenance Mode";
      title.textContent = "We'll Be Back Soon";
      message.textContent = "SnapQueue is temporarily unavailable for scheduled maintenance. Please try again later.";
    } else if (mode === "vacation") {
      label.textContent = "Vacation Mode";
      title.textContent = "We Are Currently on Vacation";
      message.textContent = "Our services are temporarily paused. We will be back soon.";
    }

    fetch("/api/system/status")
      .then((r) => r.json())
      .then((data) => {
        const system = data?.system;
        if (!system) return;
        if (system.activeMode === "maintenance") {
          label.textContent = "Maintenance Mode";
          title.textContent = "We'll Be Back Soon";
          message.textContent = system.activeMessage || message.textContent;
        } else if (system.activeMode === "vacation") {
          label.textContent = "Vacation Mode";
          title.textContent = "We Are Currently on Vacation";
          message.textContent = system.activeMessage || message.textContent;
        }
      })
      .catch(() => {});
  </script>
  <script src="chat-widget.js"></script>
</body>
</html>
